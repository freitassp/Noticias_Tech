<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Front-End: Projeto Prático</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="header-principal" class="header-estilo">
        
        <h1>Prateleira <span class="destaque">Tech</span> </h1>         <!-- poderia utilizar span titulo -->

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="https://google.com" target="_blank">Notícias</a></li>
            </ul>
        </nav>

    </header>

    <main class="container">

        <section id="card-noticia" class="card">
            
            <img src="img/logofront.jpg" alt="Logo" class="logo-redonda">

            <h2>Front-End <ins>para Iniciantes</ins></h2>
            
            <p>
                <strong>Resumo:</strong> Este guia prático ensina do zero como criar sites <i>modernos</i> e totalmente responsivos.
            </p>

            <p>
                De <del>R$ 100,00</del> por apenas <strong>R$ 80,00</strong>.
            </p>

            <a href="https://www.amazon.com.br" target="_blank" onclick="comprar()">
                <button class="btn-compra">Comprar Agora</button>
            </a>

            <!-- Deixar por ultimo -->


            <form class="form-comentario">
                
                <label for="comentario">Deixe seu comentário:</label>
                
                <textarea id="comentario" rows="3" placeholder="O que você achou?"></textarea>
                
                <button type="submit">Enviar Comentário</button>

            </form>

            <!-- Deixar por ultimo -->

        </section>

     </main> 

 
     <footer class="rodape">
        <p>&copy; 2026 - Criado na aula de Programação</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
